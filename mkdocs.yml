site_name: vhd-forensic
site_url: https://securityronin.github.io/vhd-forensic/
repo_url: https://github.com/SecurityRonin/vhd-forensic
repo_name: SecurityRonin/vhd-forensic
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle: { icon: material/brightness-7, name: Switch to dark mode }
    - scheme: slate
      primary: indigo
      accent: blue
      toggle: { icon: material/brightness-4, name: Switch to light mode }
  features:
    - content.code.copy
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - tables
  - toc: { permalink: true }

nav:
  - Home: index.md
  - Validation: validation.md
  - Implementation Notes: implementation-notes.md
  - Privacy Policy: privacy.md
  - Terms of Service: terms.md

plugins:
  - search

# Directory URLs (/privacy/, /terms/) — matches the README footer standard.
use_directory_urls: true
